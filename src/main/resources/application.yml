server:
  port: ${PORT:8080}
spring:
  datasource:
    url: jdbc:h2:file:./sql-explainer-history;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
llm:
  api-key: ${ANTHROPIC_API_KEY:}
  model: ${LLM_MODEL:claude-sonnet-4-6}
  api-url: ${LLM_API_URL:https://api.anthropic.com}
  max-tokens: 2000
  timeout-seconds: 60
